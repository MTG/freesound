volumes:
    pgdata:
    solr9data:

services:
    db:
        image: postgres:18.3
        env_file:
            - environment
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=freesound
            - POSTGRES_DB=freesound
            - FS_USER_ID

    search:
        image: solr:9.8.1
        command: ["-c"]
        volumes:
            - solr9data:/var/solr
        ports:
            - "8983:8983"

    test_runner:
        image: freesound-test:ci
        build:
            context: ./
            dockerfile: ./docker/Dockerfile.workers_web
            target: freesound
        init: true
        env_file:
            - environment
        environment:
            - FS_USER_ID
        depends_on:
            - db

    test_runner_search:
        image: freesound-test:ci
        build:
            context: ./
            dockerfile: ./docker/Dockerfile.workers_web
            target: freesound
        init: true
        env_file:
            - environment
        environment:
            - FS_USER_ID
        depends_on:
            - db
            - search
