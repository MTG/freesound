{% load display_sound %}

{% if featured_sounds %}
<div class="col-12">
    <div style="background-color: #fff8e1; padding: 16px; margin-bottom: 16px;">
        <div class="text-18 v-spacing-3" style="color: #f5a623;">Featured</div>
        <div class="row">
            {% for sound in featured_sounds %}
            <div class="col-6 col-md-4">
                {% display_sound_small sound %}
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
